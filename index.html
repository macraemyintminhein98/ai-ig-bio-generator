<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenius AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: var(--pico-background-color); }
        main { width: 100%; max-width: 600px; padding: 2rem; border-radius: var(--pico-border-radius); box-shadow: var(--pico-box-shadow); }
        hgroup { text-align: center; margin-bottom: 2rem; }
        .bio-results { margin-top: 2rem; }
        .bio-item { background-color: var(--pico-form-element-background-color); padding: 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; word-wrap: break-word; }
        .loading-spinner { display: none; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <main class="container">
        <hgroup>
            <h1>BioGenius AI</h1>
            <p>Craft your perfect Instagram bio instantly!</p>
        </hgroup>
        <form id="bioForm">
            <label for="keywords">Tell us about yourself (e.g., travel blogger, fitness enthusiast):</label>
            <input type="text" id="keywords" name="keywords" placeholder="Enter keywords, hobbies, or passions" required>
            <button type="submit" class="primary">Generate Bio</button>
        </form>
        <article id="loadingSpinner" class="loading-spinner">
            <strong>Generating amazing bios...</strong>
            <progress></progress>
        </article>
        <div id="bioResults" class="bio-results"></div>
    </main>
    <script>
        // This is a placeholder for actual AI integration.
        // In a real Next.js app, this would be handled server-side.
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const bioResults = document.getElementById('bioResults');
            const loadingSpinner = document.getElementById('loadingSpinner');

            loadingSpinner.style.display = 'block';
            bioResults.innerHTML = '';

            // Simulate API call
            await new Promise(resolve => setTimeout(resolve, 2000)); 

            const mockBios = [
                `Wanderlust soul \ud83c\udf0d | Sharing my adventures & travel tips \ud83c\udf34 | "Life is short, travel often" \u2728 #TravelBlogger #Explorer`, 
                `Fueling my body & mind \u2728 | Fitness journey advocate \ud83d\udcaa | Healthy living enthusiast \ud83e\udd69 | Let's get fit together! #FitnessMotivation #HealthyLifestyle`, 
                `Mompreneur \ud83d\udc69\u200d\ud83d\udcbc | Balancing motherhood & business \ud83d\udc6a | Empowering women to achieve their dreams \u2705 #MomLife #Entrepreneur`, 
                `Creator \u2728 | Daydreamer \ud83e\uddd1\u200d\ud83c\udfa8 | Storyteller \ud83d\udcdc | Turning ideas into reality. Let's connect! #CreativeMind #Innovation`
            ];
            
            mockBios.forEach(bio => {
                const div = document.createElement('div');
                div.className = 'bio-item';
                div.textContent = bio;
                bioResults.appendChild(div);
            });

            loadingSpinner.style.display = 'none';
        });
    </script>
</body>
</html>
