<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-lg">
        <h1 class="text-3xl font-bold text-center mb-6">Generate Your Insta Bio</h1>
        <form id="bioForm" class="space-y-4">
            <div>
                <label for="keywords" class="block text-sm font-medium text-gray-700">Keywords (comma-separated):</label>
                <input type="text" id="keywords" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="e.g., travel, foodie, entrepreneur">
            </div>
            <div>
                <label for="tone" class="block text-sm font-medium text-gray-700">Desired Tone:</label>
                <select id="tone" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                    <option value="friendly">Friendly</option>
                    <option value="professional">Professional</option>
                    <option value="witty">Witty</option>
                    <option value="inspirational">Inspirational</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Generate Bio</button>
        </form>
        <div id="result" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded-md hidden">
            <p class="font-medium text-gray-700">Your New Bio:</p>
            <p id="generatedBio" class="text-gray-900 mt-2"></p>
        </div>
        <button id="buyButton" class="mt-6 w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 hidden">Buy Now - $9.99</button>
    </div>
    <script>
        document.getElementById('bioForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const keywords = document.getElementById('keywords').value;
            const tone = document.getElementById('tone').value;
            const resultDiv = document.getElementById('result');
            const generatedBioParagraph = document.getElementById('generatedBio');

            generatedBioParagraph.textContent = `Generating a ${tone} bio using keywords: ${keywords}... (AI integration coming soon!)`;
            resultDiv.classList.remove('hidden');
            document.getElementById('buyButton').classList.remove('hidden');
        });

        document.getElementById('buyButton').addEventListener('click', () => {
            alert('Redirecting to secure checkout! (Stripe integration coming soon)');
        });
    </script>
</body>
</html>
