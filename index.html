<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instagram Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">AI Instagram Bio Generator</h1>
        <p class="mb-6 text-gray-600">Craft the perfect bio with AI!</p>
        
        <div class="mb-4">
            <label for="keywords" class="block text-left text-sm font-medium text-gray-700">Keywords (e.g., tech, travel, artist)</label>
            <input type="text" id="keywords" class="mt-1 p-2 border border-gray-300 rounded-md w-full" placeholder="Enter keywords, comma-separated">
        </div>

        <div class="mb-6">
            <label for="style" class="block text-left text-sm font-medium text-gray-700">Style (e.g., witty, professional, creative)</label>
            <input type="text" id="style" class="mt-1 p-2 border border-gray-300 rounded-md w-full" placeholder="Influencer, business, personal">
        </div>
        
        <div id="output-area" class="hidden mb-6 p-4 bg-gray-50 border border-gray-200 rounded-md text-left text-gray-800 relative">
            <p id="generated-bio" class="whitespace-pre-wrap"></p>
            <button id="copy-btn" class="mt-3 px-3 py-1 bg-blue-500 text-white text-sm rounded-md hover:bg-blue-600">Copy</button>
        </div>

        <button id="generate-btn" class="bg-purple-600 text-white py-2 px-4 rounded-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-opacity-50 w-full mb-4">
            Generate Bio
        </button>
        <button id="checkout-btn" class="bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 w-full">
            Get More Bios
        </button>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Placeholder for actual AI & Stripe integration. Front-end simulation.
        document.getElementById('generate-btn').addEventListener('click', () => {
            const keywords = document.getElementById('keywords').value;
            const style = document.getElementById('style').value;
            const bioOutput = document.getElementById('generated-bio');
            const outputArea = document.getElementById('output-area');
            
            if (keywords && style) {
                // Simulate AI generation
                bioOutput.textContent = `💫 ${style} vibes! ${keywords}. Living life, one post at a time. ✨`;
                outputArea.classList.remove('hidden');
            } else {
                bioOutput.textContent = "Please enter keywords and a style.";
                outputArea.classList.remove('hidden');
            }
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const bioText = document.getElementById('generated-bio').textContent;
            navigator.clipboard.writeText(bioText).then(() => {
                alert('Bio copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        });

        document.getElementById('checkout-btn').addEventListener('click', () => {
            alert('Integration with Stripe Checkout would go here for payment. Product: AI Bio Pack. Price: $4.99');
            // Example: stripe.redirectToCheckout({ sessionId: 'YOUR_STRIPE_SESSION_ID' });
        });
    </script>
</body>
</html>
